apis:
- aid: shipbob:shipbob-developer-api
  name: ShipBob Developer API
  description: ShipBob Developer API provides versioned REST endpoints for channels,
    orders, products, inventory, receiving orders, returns, webhooks, locations, billing,
    and shipment simulations. Latest API version is 2026-01 (released February 2026);
    selectable via dated URL prefix (e.g. /2026-01/order). Authentication via Personal
    Access Token (PAT) for single-user integrations or OAuth 2.0 for multi-tenant
    App Store apps. Sliding-window rate limit of 150 requests/minute per user per
    application; throttled responses return HTTP 429 with `x-retry-after` and `x-remaining-calls`
    headers.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
